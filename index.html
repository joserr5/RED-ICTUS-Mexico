<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- BARRA SUPERIOR OSCURA --- */
        .top-bar {
            background-color: #3b3b3b;
            color: #d1d1d1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 40px;
            font-size: 12px;
        }
        .top-bar .social-icons i { margin-right: 15px; cursor: pointer; }
        .top-bar .contact-email i { margin-right: 8px; }

        /* --- BARRA DE NAVEGACIÓN (BLANCA) --- */
        .navbar {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            border-bottom: 1px solid #eaeaea;
        }
        .logo-container {
            display: flex;
            align-items: center;
        }
        .logo-container img {
            height: 50px; /* Ajusta según tu imagen del logo */
        }
        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 25px;
        }
        .nav-links li {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #333333; 
            transition: color 0.3s ease-in-out; /* la velocidad de la animación */
        }
        
        /* El color rojo se aplica cuando pasas el mouse */
        .nav-links li.active, .nav-links li:hover { 
            color: #d31224; 
        }
  

        /* --- SECCIÓN PRINCIPAL (HERO) --- */
/* --- SECCIÓN PRINCIPAL (HERO) --- */
        .hero {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://redictus.org/images/slideshow/redictus-slider-1000.jpg');
            background-size: cover;
            background-position: center top; /* Ajustado para que se vea mejor la imagen */
            min-height: 80vh; /* Altura mínima garantizada */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .hero h1 {
            color: #ffffff;
            font-size: 5vw; 
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            z-index: 2;
        }

        /* --- ELEMENTOS FLOTANTES --- */
        /* Líneas a la izquierda */
        .left-lines {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .left-lines span {
            display: block;
            width: 30px;
            height: 2px;
            background-color: #333; /* En la imagen original están sobre fondo oscuro, ajusta el color si es necesario */
        }
        .left-lines span:nth-child(2) { width: 15px; } /* Línea del medio más corta */

        /* Pestaña de Facebook a la derecha */
        .fb-tab {
            position: absolute;
            right: 0;
            top: 40%;
            background-color: #3b5998;
            color: white;
            padding: 15px 5px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Selector de idioma abajo a la izquierda */
        .lang-selector {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background-color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .lang-selector img {
            width: 25px;
            height: 20px;
        }
        /* --- BOTÓN FLOTANTE DE INSTAGRAM EN HOME --- */
/* --- BOTÓN FLOTANTE DE INSTAGRAM EN HOME --- */
.ig-floating-button {
    position: absolute; 
    bottom: 30px; /* Distancia desde la parte inferior */
    right: 40px;  /* Distancia desde la derecha */
    
    font-size: 65px; /* Ajustado un poco para que encaje mejor en la esquina */
    color: #f0f0f0; 
    transition: all 0.5s ease-in-out; 
    z-index: 10; 
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* El código del hover y la animación @keyframes se quedan exactamente igual */

/* EFECTO HOVER: BRILLO Y COLOR PERIÓDICO */
.ig-floating-button:hover {
    transform: translate(-50%, -50%) scale(1.15); /* Crece un poquito */
    
    /* Efecto de color de texto degradado de Instagram */
    background: -webkit-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent; /* Hace invisible el color por defecto para mostrar el degradado de fondo */
    
    /* Activar la animación de brillo periódico solicitada */
    animation: igPeriodicGlow 2.5s infinite alternate;
}

/* ANIMACIÓN: El logo brilla a color cada cierto tiempo */
@keyframes igPeriodicGlow {
    0%, 100% {
        /* Brillo sutil */
        filter: drop-shadow(0 0 5px rgba(220, 39, 67, 0.4)) saturate(1);
    }
    50% {
        /* Brillo intenso y saturación extra periódicamente */
        filter: drop-shadow(0 0 25px rgba(188, 24, 136, 0.9)) saturate(1.8);
    }
}
    </style>
