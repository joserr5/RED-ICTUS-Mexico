<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Ictus México</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- BARRA SUPERIOR OSCURA --- */
        .top-bar {
            background-color: #3b3b3b;
            color: #d1d1d1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 40px;
            font-size: 12px;
        }
        .top-bar .social-icons i { margin-right: 15px; cursor: pointer; }
        .top-bar .contact-email i { margin-right: 8px; }

        /* --- BARRA DE NAVEGACIÓN (BLANCA) --- */
        .navbar {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            border-bottom: 1px solid #eaeaea;
        }
        .logo-container {
            display: flex;
            align-items: center;
        }
        .logo-container img {
            height: 50px; /* Ajusta según tu imagen del logo */
        }
        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 25px;
        }
        .nav-links li {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-links li.active { color: #d31224; } /* Color rojo institucional */
        .nav-links li:not(.active) { color: #333333; }
        .menu-icon {
            font-size: 24px;
            color: #333;
            margin-left: 20px;
            cursor: pointer;
        }

        /* --- SECCIÓN PRINCIPAL (HERO) --- */
        .hero {
            /* REEMPLAZA 'fondo.jpg' CON LA RUTA DE TU IMAGEN */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://via.placeholder.com/1920x1080/2a2a2a/ffffff?text=Reemplazar+con+imagen+de+fondo');
            background-size: cover;
            background-position: center;
            height: calc(100vh - 110px); /* Altura total menos el header */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .hero h1 {
            color: #ffffff;
            font-size: 5vw; /* Tamaño responsivo */
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
        }

        /* --- ELEMENTOS FLOTANTES --- */
        /* Líneas a la izquierda */
        .left-lines {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .left-lines span {
            display: block;
            width: 30px;
            height: 2px;
            background-color: #333; /* En la imagen original están sobre fondo oscuro, ajusta el color si es necesario */
        }
        .left-lines span:nth-child(2) { width: 15px; } /* Línea del medio más corta */

        /* Pestaña de Facebook a la derecha */
        .fb-tab {
            position: absolute;
            right: 0;
            top: 40%;
            background-color: #3b5998;
            color: white;
            padding: 15px 5px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Selector de idioma abajo a la izquierda */
        .lang-selector {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background-color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .lang-selector img {
            width: 20px;
            height: 15px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="social-icons">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-instagram"></i>
        </div>
        <div class="contact-email">
            <i class="far fa-envelope"></i> contacto@redictus.org
        </div>
    </div>

    <nav class="navbar">
    <div class="logo-container">
        <img class="logo-image" srcset="https://redictus.org/images/logo/redictus-logo.jpg 1x, https://redictus.org/images/logo/redictus-logo.jpg 2x" src="https://redictus.org/images/logo/redictus-logo.jpg" height="60" alt="Red ICTUS México">
    </div>
    <ul class="nav-links">
        <li class="active">Red ICTUS México</li>
        <li>Nosotros</li>
        <li>Servicios</li>
        <li>Qué nos mueve</li>
        <li>Donaciones</li>
        <li>Eventos</li>
        <li>Contacto</li>
        <li><i class="fas fa-bars menu-icon"></i></li>
    </ul>
</nav>

    <section class="hero">
        <div class="left-lines">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1>LA EMPRESA CONTRA EL ICTUS</h1>

        <div class="fb-tab">facebook</div>

        <div class="lang-selector">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Bandera_de_Espa%C3%B1a.svg/1200px-Bandera_de_Espa%C3%B1a.svg.png" alt="Bandera España">
            ES <i class="fas fa-chevron-up" style="font-size: 10px; color: #666;"></i>
        </div>
    </section>

</body>
</html>
